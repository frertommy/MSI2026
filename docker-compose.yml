services:

  # ─────────────────────────────────────────────────────────────
  # scheduler — опрашивает API, считает цены, пишет в Supabase
  # Порт 3000: /health endpoint
  # ─────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────────────────────
  # web — Next.js фронтенд
  # Порт 3001: веб-интерфейс
  # ─────────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      scheduler:
        condition: service_healthy
